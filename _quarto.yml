project:
  type: website
  output-dir: .

website:
  title: "Growise"
  navbar:
    left:
      - href: index.qmd
        text: Inicio
      - href: quienes-somos.qmd
        text: Quiénes Somos
      - href: servicios.qmd
        text: Servicios
      - href: articulos.qmd
        text: Artículos

format:
  html:
    theme: cosmo
    css: assets/css/main.css
    toc: true
    lang: es
    include-in-header:
      - google-analytics.html
      - text: |
          <style>
          /* RESET BÁSICO GLOBAL */
          body { padding: 0 !important; margin: 0 !important; }
          .quarto-container { max-width: none !important; padding: 0 !important; }
          main { margin-top: 0 !important; padding: 0 !important; }
          
          /* LEGIBILIDAD (Para los artículos) */
          p, li, section, .quarto-title-meta { color: #333 !important; font-size: 1.05em; line-height: 1.6; }
          h1, h2, h3, h4 { color: #2c3e50 !important; font-weight: bold; }
          
          /* GALERÍA DE ARTÍCULOS Y METADATOS */
          header.quarto-title-block { padding-top: 3em !important; margin-bottom: 2em !important; }
          .quarto-listing-category-title { font-weight: bold; color: #787878; margin-bottom: 1em; }
          .quarto-title-meta { border-top: 1px solid #eee; margin-top: 2em; padding-top: 1em; }
          .quarto-title-meta-heading { color: #888; text-transform: uppercase; font-size: 0.75em; letter-spacing: 1px; }
          .quarto-title-meta-contents { color: #444; }
          .cell-output-display img { max-width: 100% !important; height: auto !important; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 25px 0; }
          </style>
    include-after-body:
      - text: |
          <script src="/assets/js/jquery.min.js"></script>
          <script src="/assets/js/jquery.poptrox.min.js"></script>
          <script src="/assets/js/browser.min.js"></script>
          <script src="/assets/js/breakpoints.min.js"></script>
          <script src="/assets/js/util.js"></script>
          <script src="/assets/js/main.js"></script>